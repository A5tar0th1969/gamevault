<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15);stop-opacity:1"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="192" fill="url(#bg)"/>
  <!-- Inner border -->
  <rect x="80" y="80" width="864" height="864" rx="144" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="6"/>
  <!-- Decorative circle -->
  <circle cx="800" cy="224" r="160" fill="url(#glow)"/>
  <!-- GV Logo Text -->
  <text x="512" y="590" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="360" font-weight="800" fill="white" letter-spacing="-8">GV</text>
  <!-- Small decorative dots -->
  <circle cx="256" cy="768" r="12" fill="rgba(255,255,255,.2)"/>
  <circle cx="296" cy="768" r="12" fill="rgba(255,255,255,.12)"/>
  <circle cx="336" cy="768" r="12" fill="rgba(255,255,255,.06)"/>
</svg>
